# BioPipelines Configuration — Google Colab variant
# Loaded as `config.colab.yaml`. Auto-detected when running inside Google Colab,
# or selected explicitly via `Pipeline(config="colab")`.
# Uses micromamba for environment management, matching the cluster behavior.

# Folder Configuration
machine:
  # Colab runs as "root" in most sessions; variant selection is driven by
  # the google.colab import check, not username matching. Left empty.
  username: ""
  emails: {}

  # micromamba: isolated environments per tool, matching cluster behavior
  env_manager:
    name: "micromamba"
    init:
    - 'eval "$(micromamba shell hook --shell bash)"'

  # No scheduler on Colab — tools run inline as the notebook executes.
  # `init` and `modules` are empty: Colab notebooks already run inside an
  # initialised shell with conda/micromamba on PATH, and there is no
  # environment-modules system to bring in.
  scheduler:
    name: "colab"
    init: []
    modules: []

  # No containers on Colab.
  container_executor: "none"
folders:
  base:
    home: "/root"
    data: "/content/data"
    scratch: "/content/scratch"
    biopipelines: "<cwd>"
    biopipelines_output: "/content/BioPipelines"

  infrastructure:
    pipe_scripts: "<biopipelines>/pipe_scripts"
    pdbs: "<biopipelines>/pdbs"
    ligands: "<biopipelines>/ligands"
    sequences: "<biopipelines>/sequences"
    tables: "<biopipelines>/tables"
    cache: "/content/cache"
    containers: "/content/containers"

  repositories:
    RFdiffusion: "<data>/RFdiffusion"
    RFdiffusionAllAtom: "<data>/rf_diffusion_all_atom"
    RFdiffusion3: "<data>/rfdiffusion3"
    ProteinMPNN: "<data>/ProteinMPNN"
    LigandMPNN: "<data>/LigandMPNN"
    AlphaFold: "<data>/localcolabfold"

    Boltz: "<data>/boltz"
    BoltzGen: "<data>/boltzgen"
    GhostFold: "<data>/ghostfold"
    MMseqs2: "<data>/mmseqs"
    ModelForge: "<data>/modelforge"

  cache:
    BoltzCache: "<cache>/Boltz"
    BoltzGenCache: "<cache>/BoltzGen"
    ColabFoldDatabases: "<cache>/colabfold_databases"
    MMseqs2Databases: "<cache>/mmseqs2_databases"

  server:
    MMseqs2Server: "<biopipelines_output>/MMseqs2Server"

# Default Environments
# Same as the cluster config — micromamba creates isolated envs per tool
environments:
  # Structure generation
  RFdiffusion: "SE3nv"
  RFdiffusionAllAtom: "SE3nv"
  RFdiffusion3: "foundry"
  BoltzGen: "boltzgen"
  BoltzGenMerge: "boltzgen"
  BoltzGenImport: "boltzgen"

  # Sequence design
  ProteinMPNN: "SE3nv"
  LigandMPNN: "ligandmpnn_env"
  MutationComposer: "MutationEnv"
  Mutagenesis: "MutationEnv"
  Fuse: "biopipelines"
  StitchSequences: "biopipelines"
  DNAEncoder: "biopipelines"
  RBSDesigner: "rbs_designer"

  # Structure prediction
  AlphaFold: "biopipelines"
  Boltz2: "Boltz2Env"
  RF3: "modelforge"

  # Flexibility
  CABSflex: "CABSflex"

  # Analysis
  Gnina: "biopipelines"
  Distance: "biopipelines"
  DistanceSelector: "biopipelines"
  ConformationalChange: "ProteinEnv"
  MutationProfiler: "MutationEnv"
  SequenceMetricCorrelation: "MutationEnv"
  BayesianAdjuster: "MutationEnv"
  PoseBusters: "posebusters"
  Contacts: "ProteinEnv"
  PoseChange: "ProteinEnv"
  SASA: "ProteinEnv"
  ADMETAI: "admet_ai"

  # Data management
  Panda: "biopipelines"
  ExtractMetrics: "biopipelines"
  Selection: "ProteinEnv"

  # Utilities
  Load: "biopipelines"
  MMseqs2: "biopipelines"
  MMseqs2Server: "biopipelines"
  CompoundLibrary: "biopipelines"
  PDB: "biopipelines"
  Ligand: "biopipelines"
  Sequence: "biopipelines"
  PyMOL: "ProteinEnv"
  Plot: "biopipelines"

renderers:
  streams:
    _metadata: renderers/streams.py
    pdb: renderers/structures.py
    cif: renderers/structures.py
    "pdb|cif": renderers/structures.py
    png: renderers/images.py
    jpg: renderers/images.py
    jpeg: renderers/images.py
    svg: renderers/images.py
    gif: renderers/images.py
    bmp: renderers/images.py
    tiff: renderers/images.py
    webp: renderers/images.py
    plots: renderers/plots.py
    fasta: renderers/fasta.py
    fa: renderers/fasta.py
    _default: renderers/streams.py
  tables:
    _default: renderers/tables.py

