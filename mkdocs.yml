site_name: BioPipelines
site_description: A Python framework for automated computational protein design workflows
site_url: https://biopipelines.readthedocs.io/
repo_url: https://github.com/locbp-uzh/biopipelines
repo_name: locbp-uzh/biopipelines

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - User Guide: user_manual.md
  - Tool Reference:
      - Overview: tool_reference.md
      - Utilities & Inputs: tool/utilities.md
      - Structure Generation: tool/structure_generation.md
      - Sequence Design: tool/sequence_design.md
      - Structure Prediction: tool/structure_prediction.md
      - Analysis: tool/analysis.md
      - Statistics: tool/statistics.md
      - Data Management: tool/data_management.md
  - Examples: examples.md
  - Developer Guide: developer_manual.md
