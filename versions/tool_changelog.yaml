# Source of truth for biopipelines tool wrapper versions.
#
# Each entry maps a tool class to:
#   - files: wrapper module + pipe scripts whose changes count as
#     "wrapper changes" for version-bump purposes. The pre-commit hook
#     (scripts/check_tool_version_bumps.py) refuses any commit that
#     modifies one of these files without bumping `current` (and
#     mentioning the tool under [unreleased] in CHANGELOG.md).
#   - current: the wrapper's TOOL_VERSION value (must match the literal
#     in the wrapper's class body).
#   - history: append-only list of {version, date, note} entries.
#
# Bump rules of thumb:
#   - patch (1.0 -> 1.1): bug fix, refactor that doesn't change CLI
#     mapping / generated bash / output streams.
#   - minor (1.x -> 2.0): change to validate_params, generated bash,
#     stream contract, or new user-facing parameters.
#   - major: backwards-incompatible (renamed parameters, removed
#     outputs).
#
# Pipe scripts under pipe_scripts/ that are shared infrastructure
# (pipe_check_completion.py, pipe_filter_execution.py, etc.) are
# intentionally NOT mapped to any tool — their changes are framework
# changes and should be reflected in biopipelines.__version__ + the
# Framework section of CHANGELOG.md instead.

