# Mirror the 'public' branch to GitHub as 'main'
# Requires CI/CD variable GITHUB_PUSH_TOKEN (a GitHub PAT with repo scope)
# Set in: GitLab > Settings > CI/CD > Variables (masked & protected)

mirror-to-github:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "public"'
  script:
    - git clone --branch public --single-branch "$CI_REPOSITORY_URL" repo
    - cd repo
    - git remote add github https://x-access-token:${GITHUB_PUSH_TOKEN}@github.com/locbp-uzh/biopipelines.git
    - git push github public:main
