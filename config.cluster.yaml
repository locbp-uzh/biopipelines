  PDB: "biopipelines"
  PLACER: "placer"
  PLIP: "biopipelines"  # container mode: host env only needs pandas + helpers
  PLM_Sol: "plm_sol"
  Plot: "biopipelines"
  PocketGen: "pocketgen"
  PoseBusters: "posebusters"
  PoseChange: "ProteinEnv"
  Prodigy: "prodigy"
  ProLIF: "prolif"
  ProteinMPNN: "SE3nv"
  PyMOL: "ProteinEnv"
  RBSDesigner: "rbs_designer"
  RDKit: "biopipelines"
  Reduce: "reduce"
  RF3: "modelforge"
  RFdiffusion: "SE3nv"
  RFdiffusion2: "biopipelines"  # container mode: host env only runs the pandas/BioPython helpers; inference runs in the .sif
  RFdiffusion3: "foundry"
  RFdiffusionAllAtom: "SE3nv"
  RTMScore: "rtmscore"
  SASA: "ProteinEnv"
  Selection: "ProteinEnv"
  Sequence: "biopipelines"
  SequenceMetricCorrelation: "MutationEnv"
