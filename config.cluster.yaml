# Containers
# Singularity/Apptainer container images for tools that use containerized execution
# When a container is configured for a tool, it will be used instead of the conda environment
containers:
  PLIP: "<containers>/plip_3.0.0.simg"
  # RFdiffusion2 ships its own Apptainer image (downloaded by setup.py during
  # install). Point this at the .sif under the repo's rf_diffusion/exec/.
  RFdiffusion2: "<RFdiffusion2>/rf_diffusion/exec/bakerlab_rf_diffusion_aa.sif"
tool_overrides:
  gnina:
    modules:
    - "cuda/12.6.3"
    - "cudnn/9.8.0.87-12"
    ld_library_path: "/apps/u24/opt/x86_64_v3/cuda-12.6.3-ok2c7hqa5kefkh3iyolgxrajfpepvh6h/targets/x86_64-linux/lib"
  mmseqs2server:
    # Which MMseqs2 server a client auto-starts when none is running: "cpu"
    # (default) runs colabfold_search on a large-RAM CPU node with the DBs
    # resident in RAM; "gpu" uses the GPU-padded DBs + gpuserver. A server of
    # either mode that is already up is reused regardless of this setting.
    mode: "cpu"
    # Size of the server pool the auto-start launches (default 1). The single
    # client that wins the submit lock submits this many identical server jobs;
    # they all drain the one shared queue (each query is claimed atomically, so
    # no two servers process the same one). >1 trades cluster allocation for
    # throughput under many concurrent queries. The user can also launch extra
    # servers manually at any time.
    num_servers: 1

# renderers
# Controls how tool outputs are displayed in Jupyter notebooks.
# Maps stream formats (or stream names) to renderer scripts in the renderers/ folder.
# Lookup order: stream name first, then format, then _default.
renderers:
  streams:
    _metadata: renderers/streams.py
    pdb: renderers/structures.py
    cif: renderers/structures.py
    "pdb|cif": renderers/structures.py
    pqr: renderers/structures.py
    dx: renderers/grids.py
    png: renderers/images.py
    jpg: renderers/images.py
    jpeg: renderers/images.py
    svg: renderers/images.py
    gif: renderers/images.py
    bmp: renderers/images.py
    tiff: renderers/images.py
    webp: renderers/images.py
    plots: renderers/plots.py
    fasta: renderers/fasta.py
    fa: renderers/fasta.py
    _default: renderers/streams.py
  tables:
    _default: renderers/tables.py
