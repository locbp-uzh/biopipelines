environments:
  ADMETAI: "admet_ai"
  AF2BIND: "af2bind"
  Aggrescan3D: "Aggrescan3D"
  AlphaFold: "biopipelines"
  APBS: "apbs"
  BayesianAdjuster: "MutationEnv"
  BioEmu: "bioemu"
  Boltz2: "Boltz2Env"
  BoltzGen: "boltzgen"
  BoltzGenImport: "boltzgen"
  BoltzGenMerge: "boltzgen"
  CABSflex: "CABSflex"
  CompoundLibrary: "biopipelines"
  ConformationalChange: "ProteinEnv"
  Contacts: "ProteinEnv"
  DiffDock: "diffdock"
  Distance: "biopipelines"
  DistanceSelector: "biopipelines"
  DNAEncoder: "biopipelines"
  DSSP: "dssp"
  DynamicBind: "dynamicbind"
  ESMFold: "esmfold"
  ExtractMetrics: "biopipelines"
  FPocket: "fpocket"
  Frame2Seq: "frame2seq"
  Fuse: "biopipelines"
  GEMS: "gems"
  Gnina: "biopipelines"
  HBDesigner: "hbdesigner"
  Ligand: "biopipelines"
  LigandMPNN: "ligandmpnn_env"
  Load: "biopipelines"
  MMseqs2: "biopipelines"
  MMseqs2Server: "biopipelines"
  Mutagenesis: "MutationEnv"
  MutationComposer: "MutationEnv"
  MutationProfiler: "MutationEnv"
  NeuralPLexer: "neuralplexer"
  OpenBabel: "biopipelines"
  OpenMM: "openmm"
  P2Rank: "p2rank"
