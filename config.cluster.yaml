machine:
  # Unix username used for variant auto-detection. If the current user
  # (getpass.getuser()) matches this value, the loader picks this variant
  # without needing Pipeline(config="cluster"). Leave empty to opt out.
  username: "gquarg"

  # Notification email used by SLURM submissions with email="auto".
  # Empty ("") disables email notifications (the default — avoids spam).
  # Set your address to opt in, e.g. "you@example.com".
  email: ""

  # Environment manager. `name` selects "mamba", "conda", "micromamba",
  # or "pip". `init` is a list of raw bash lines emitted before any
  # per-tool `<mgr> activate <env>` call — typically the manager's shell
  # hook so `mamba activate` works in non-interactive shells. The user
  # supplies these verbatim; the framework no longer derives them from
  # the manager name (this lets you override for non-standard installs).
  # Use `init: []` for managers like pip that need no shell hook.
  env_manager:
    name: "mamba"
    init:
    - 'eval "$(mamba shell hook --shell bash)"'

  # Scheduler. `name` selects "slurm", "colab", or "none". `init` is a
  # list of raw bash lines emitted at the very top of every batch script,
  # before any GPU setup, module load, or per-tool activation — use it
  # to bring host primitives into scope (e.g. source the lmod profile so
  # `module` is available in non-login SLURM shells). `modules` is the
  # list of environment modules to `module load` in batch scripts (only
  # meaningful when name="slurm" and the cluster uses lmod / Tcl modules).
  scheduler:
    name: "slurm"
    init:
      # Source the host's lmod profile so `module` is on PATH AND so the
      # site-specific MODULEPATH additions (z01_lmodenv.sh on UZH S3IT)
      # are visible to module load. /etc/profile.d/lmod.sh alone is not
      # enough because the site usually carries MODULEPATH in a separate
      # z*_*.sh fragment loaded *after* lmod.sh in alphabetical order.
      # This list is produced by `bp-config auto`, which keeps every
      # /etc/profile.d/*.sh that contributes module state (lmod function,
      # MODULEPATH) OR sets an outbound proxy — the latter so runtime
      # downloads (pip git+https, curl/wget of weights) work on compute
      # nodes, whose non-interactive SLURM shells don't read profile.d.
    - 'for f in /etc/profile.d/lmod.sh /etc/profile.d/proxy.sh /etc/profile.d/z*_lmodenv.sh;
      do [ -f "$f" ] && source "$f"; done'
      # If stale packages under ~/.local/lib/python<ver>/site-packages shadow a
      # conda env (symptom: ImportError for a package that is installed in the
      # env, e.g. "cannot import name 'Sentinel' from typing_extensions"),
      # uncomment the next line to make every env ignore user-site packages.
      # The durable fix is to remove the offending ~/.local/lib/python* tree.
    # - 'export PYTHONNOUSERSITE=1'
    modules:
    - "miniforge3"
    - "apptainer"

  # Container executor: "apptainer" or "singularity" or "none"
  # Used for tools that run inside containers (e.g., RFdiffusionAllAtom)
  container_executor: "apptainer"

# GNINA-specific runtime configuration
# CUDA modules and library paths needed for GNINA's CNN scoring.
# Adjust these to match your HPC environment.
folders:
  # Base paths (resolved first)
  # Runtime placeholders: <username>, <cwd>
  # - <username>: actual username (e.g., gquarg)
  # - <cwd>: current working directory
  base:
    home: "/home/<username>"
    data: "<home>/data"
    scratch: "/scratch/<username>"
    group: "/shares/locbp.chem.uzh"
    user: "<group>/<username>"
    biopipelines: "<cwd>"
    biopipelines_output: "<user>/BioPipelines"

  # Infrastructure paths
  infrastructure:
    pipe_scripts: "<biopipelines>/pipe_scripts"
    # Folder Scripting searches for a bare script filename, so
    # Scripting("foo.py") finds <scripts>/foo.py without an absolute path.
    scripts: "<biopipelines>/my_scripts"
    pdbs: "<biopipelines>/pdbs"
    ligands: "<biopipelines>/ligands"
    sequences: "<biopipelines>/sequences"
    tables: "<biopipelines>/tables"
    cache: "<group>/cache"
    containers: "<group>/containers"

  # Installation files
  repositories:
    AF2BIND: "<data>/af2bind"
    AlphaFold: "<data>/localcolabfold"
    Boltz: "<data>/boltz"
    BoltzGen: "<data>/boltzgen"
    DiffDock: "<data>/DiffDock"
    DynamicBind: "<data>/DynamicBind"
    Frame2Seq: "<data>/Frame2Seq"
    GEMS: "<data>/GEMS"
    GhostFold: "<data>/ghostfold"
    Gnina: "<data>/gnina"
    HBDesigner: "<data>/HBDesigner"
    LigandMPNN: "<data>/LigandMPNN"
    MMseqs2: "<data>/mmseqs"
    ModelForge: "<data>/modelforge"
    NeuralPLexer: "<data>/NeuralPLexer"
    P2Rank: "<data>/p2rank"
    PLACER: "<data>/PLACER"
    PLM_Sol: "<data>/PLM_Sol"
    PocketGen: "<data>/PocketGen"
    ProteinMPNN: "<data>/ProteinMPNN"
    RFdiffusion: "<data>/RFdiffusion"
    RFdiffusion2: "<data>/RFdiffusion2"
    RFdiffusion3: "<data>/rfdiffusion3"
    RFdiffusionAllAtom: "<data>/rf_diffusion_all_atom"
    RTMScore: "<data>/RTMScore"
    ThermoMPNN: "<data>/ThermoMPNN"
    VespaG: "<data>/VespaG"

  # Cache paths (shared on group storage)
  cache:
    BoltzCache: "<cache>/Boltz"
    BoltzGenCache: "<cache>/BoltzGen"
    # Root of the ColabFold MSA database set. Shared downloads (tarballs, pdb/
    # mmCIF, DOWNLOADS_READY/PDB_MMCIF_READY markers) live at this root; the built
    # per-mode indexes live in gpu/ (padded, for mmseqs --gpu / colabfold_search
    # --gpu) and cpu/ (non-padded). MMseqs2Server appends the active mode.
    ColabFoldDatabases: "<group>/models/mmseqs2_databases"
    # The MMseqs2 server serves the same ColabFold-formatted DBs.
    MMseqs2Databases: "<ColabFoldDatabases>"
    # AF2 params shared by all AF2-consuming tools (AlphaFold, AF2BIND).
    # Its params/ subdir holds params_model_*.npz; this is ColabDesign's data_dir.
    AlphaFoldParams: "<data>/localcolabfold/colabfold"

  # Server paths
  server:
    MMseqs2Server: "<biopipelines_output>/MMseqs2Server"

# Default Environments
