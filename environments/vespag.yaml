# VespaG - cluster/HPC variant (also the shared fallback).
# VespaG ships on PyPI (`pip install vespag`) and pulls torch + its ESM-2
# dependency transitively. Minimal conda layer (Python 3.10 + pip). On the
# cluster the torch wheel resolves against the node CUDA. See vespag.pip.txt.
# NOTE: ESM-2 3B weights (~11 GB) download lazily on first prediction — run on a
# GPU node.
name: vespag
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
