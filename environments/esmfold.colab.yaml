# ESMFold - colab/micromamba variant.
# Mirrors the recipe used by sokrypton's ColabFold ESMFold notebook
# (https://colab.research.google.com/github/sokrypton/ColabFold/blob/main/ESMFold.ipynb),
# which is the de-facto known-working Colab install. Key difference vs.
# esmfold.cluster.yaml: uses the sokrypton/openfold and sokrypton/esm forks, which
# replace upstream openfold's CUDA-kernel compile path with a pure-Python
# fallback, so no nvcc / cudatoolkit-dev is needed.
#
# All pip-installed deps (torch, esm, openfold, ...) live in esmfold.pip.colab.txt.
name: esmfold
channels:
  - conda-forge
dependencies:
  - python=3.9
  - pip
  - setuptools=59.5.0
